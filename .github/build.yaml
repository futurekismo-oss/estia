name: Compile Cross-Platform Application
on: [push]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            target: linux
            artifact-name: estia-linux-appimage
          - os: windows-latest
            target: windows
            artifact-name: estia-windows-exe
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: pip install -r requirements.txt


      - name: Install Linux C Dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libmpv-dev fuse

      - name: Nuitka Compile (Linux Standalone)
        if: matrix.target == 'linux'
        uses: Nuitka/Nuitka-Action@main
        with:
          nuitka-version: main
          script-name: src/estia.py
          standalone: true
          include-package: mpv
          include-data-files: /usr/lib/x86_64-linux-gnu/libmpv.so=libmpv.so

      - name: Structure & Package AppImage
        if: matrix.target == 'linux'
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

          # Move standalone build contents to the AppDir bundle folder
          cp -r build/estia.dist/* AppDir/usr/bin/
          ln -s usr/bin/estia AppDir/AppRun

          cat <<EOF > AppDir/estia.desktop
          [Desktop Entry]
          Name=Estia
          Exec=AppRun
          Icon=estia
          Type=Application
          Categories=Utility;
          EOF

          # Use raw shell tool to drop a placeholder app icon
          convert -size 256x256 xc:blue AppDir/estia.png
          cp AppDir/estia.png AppDir/usr/share/icons/hicolor/256x256/apps/estia.png

          # Build final AppImage
          curl -L -o appimagetool https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          ./appimagetool --appimage-extract
          ./squashfs-root/AppRun AppDir Estia-x86_64.AppImage


      - name: Download Windows C Dependencies
        if: matrix.target == 'windows'
        shell: bash
        run: |
          curl -L -o mpv-dev.7z https://sourceforge.net/projects/mpv-player-windows/files/libmpv/mpv-dev-x86_64-20241027-git-456cb04.7z/download
          7z x mpv-dev.7z -ompv_libs
          echo "MPV_DIR=$(pwd)/mpv_libs" >> $GITHUB_ENV

      - name: Nuitka Compile (Windows Onefile)
        if: matrix.target == 'windows'
        uses: Nuitka/Nuitka-Action@main
        with:
          nuitka-version: main
          script-name: src/estia.py
          onefile: true
          standalone: true
          include-package: mpv
          include-data-files: ${{ env.MPV_DIR }}/mpv-1.dll=mpv-1.dll


      - name: Upload Linux Artifact
        if: matrix.target == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: Estia-x86_64.AppImage

      - name: Upload Windows Artifact
        if: matrix.target == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: build/estia.exe
